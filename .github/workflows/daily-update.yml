name: Daily update

on:
  schedule:
    # Mon-Sat at 10:00 UTC
    - cron: "0 10 * * 1-6"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (es, fr, se)"
        required: false
        type: string
        default: "es"
      date:
        description: "Date to process (YYYY-MM-DD), empty = automatic"
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.LEGALIZE_APP_ID }}
          private-key: ${{ secrets.LEGALIZE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          repository: legalize-dev/legalize-${{ inputs.country || 'es' }}
          path: repos/${{ inputs.country || 'es' }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run daily pipeline
        run: |
          COUNTRY="${{ inputs.country || 'es' }}"
          ARGS="-c $COUNTRY --repo-path repos/$COUNTRY"
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          legalize daily $ARGS

      - name: Push to output repo
        run: |
          COUNTRY="${{ inputs.country || 'es' }}"
          cd repos/$COUNTRY
          git diff --quiet && echo "No changes to push" || git push origin main
